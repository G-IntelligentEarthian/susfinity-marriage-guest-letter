<svg viewBox="0 0 200 200" width="100%" height="100%" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft watercolor gradients for earth, background, and vines -->
    <radialGradient id="bgGrad" cx="100" cy="100" r="95" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f3f8f4" stop-opacity="0.95" />
      <stop offset="60%" stop-color="#e3ede4" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#cddec0" stop-opacity="0.75" />
    </radialGradient>
    
    <radialGradient id="globeGrad" cx="100" cy="100" r="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e6f1ec" />
      <stop offset="70%" stop-color="#a3ccbe" />
      <stop offset="100%" stop-color="#75a697" />
    </radialGradient>

    <linearGradient id="vineGrad" x1="50" y1="100" x2="150" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5d7259" />
      <stop offset="50%" stop-color="#759470" />
      <stop offset="100%" stop-color="#485c44" />
    </linearGradient>

    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#3f4f3e" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Watercolor background round plaque -->
  <circle
    cx="100"
    cy="100"
    r="92"
    fill="url(#bgGrad)"
    filter="url(#softShadow)"
    stroke="#cad7c2"
    stroke-width="0.5"
  />

  <!-- 1. OUTER FLORAL WREATH (Sage/Olive leaves and flowers) -->
  <g stroke="#6e846a" stroke-width="1.5" stroke-linecap="round" fill="none">
