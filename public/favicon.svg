    <circle cx="100" cy="100" r="82" stroke-opacity="0.3" stroke-dasharray="5,3" />

    <!-- Wreath Vines - Left half and Right half -->
    <path d="M100 18 C44 18, 18 48, 18 100 C18 152, 44 182, 100 182" stroke-width="1.2" />
    <path d="M100 18 C156 18, 182 48, 182 100 C182 152, 156 182, 100 182" stroke-width="1.2" />

    <!-- Leaf details cascading along the wreath -->
    <!-- Left Hand Wreath Leaves -->
    <path d="M100 18 C92 22, 88 18, 92 14 C96 10, 100 18, 100 18 Z" fill="#7a9575" stroke="none" />
    <path d="M82 23 C74 29, 71 25, 76 20 C81 15, 82 23, 82 23 Z" fill="#829c7d" stroke="none" />
    <path d="M63 32 C55 39, 52 34, 58 29 C64 24, 63 32, 63 32 Z" fill="#768f71" stroke="none" />
    <path d="M48 45 C40 54, 38 49, 44 43 C50 37, 48 45, 48 45 Z" fill="#7d9778" stroke="none" />
    <path d="M35 63 C28 72, 27 67, 33 60 C39 53, 35 63, 35 63 Z" fill="#6d8669" stroke="none" />
    <path d="M25 82 C20 92, 19 87, 24 79 C29 71, 25 82, 25 82 Z" fill="#7ea078" stroke="none" />
    <path d="M21 102 C18 113, 17 108, 21 99 C25 90, 21 102, 21 102 Z" fill="#6d8669" stroke="none" />
    <path d="M22 122 C21 133, 21 128, 25 119 C29 110, 22 122, 22 122 Z" fill="#7a9874" stroke="none" />
    <path d="M29 142 C29 152, 31 147, 34 139 C37 131, 29 142, 29 142 Z" fill="#7ea078" stroke="none" />
    <path d="M42 160 C42 170, 45 165, 47 156 C49 147, 42 160, 42 160 Z" fill="#6e876a" stroke="none" />
    <path d="M57 172 C58 181, 62 176, 62 167 C62 158, 57 172, 57 172 Z" fill="#829f7d" stroke="none" />
    <path d="M78 180 C81 188, 85 183, 83 174 C81 165, 78 180, 78 180 Z" fill="#759070" stroke="none" />
    <path d="M98 181 C102 188, 106 183, 103 175 C100 167, 98 181, 98 181 Z" fill="#7fa279" stroke="none" />

    <!-- Right Hand Wreath Leaves -->
    <path d="M100 18 C108 22, 112 18, 108 14 C104 10, 100 18, 100 18 Z" fill="#7a9575" stroke="none" />
    <path d="M118 23 C126 29, 129 25, 124 20 C119 15, 118 23, 118 23 Z" fill="#829c7d" stroke="none" />
    <path d="M137 32 C145 39, 148 34, 142 29 C136 24, 137 32, 137 32 Z" fill="#768f71" stroke="none" />
    <path d="M152 45 C160 54, 162 49, 156 43 C150 37, 152 45, 152 45 Z" fill="#7d9778" stroke="none" />
    <path d="M165 63 C172 72, 173 67, 167 60 C161 53, 165 63, 165 63 Z" fill="#6d8669" stroke="none" />
    <path d="M175 82 C180 92, 181 87, 176 79 C171 71, 175 82, 175 82 Z" fill="#7ea078" stroke="none" />
    <path d="M179 102 C182 113, 183 108, 179 99 C175 90, 179 102, 179 102 Z" fill="#6d8669" stroke="none" />
    <path d="M178 122 C179 133, 179 128, 175 119 C171 110, 178 122, 178 122 Z" fill="#7a9874" stroke="none" />
    <path d="M171 142 C171 152, 169 147, 166 139 C163 131, 171 142, 171 142 Z" fill="#7ea078" stroke="none" />
    <path d="M158 160 C158 170, 155 165, 153 156 C151 147, 158 160, 158 160 Z" fill="#6e876a" stroke="none" />
    <path d="M143 172 C142 181, 138 176, 138 167 C138 158, 143 172, 143 172 Z" fill="#829f7d" stroke="none" />
    <path d="M122 180 C119 188, 115 183, 117 174 C119 165, 122 180, 122 180 Z" fill="#759070" stroke="none" />
  </g>

  <!-- Wreath Small Five-Petaled Flowers -->
  <!-- Flower 1 -->
  <g transform="translate(100, 18)">
    <circle cx="0" cy="0" r="4" fill="#ffffff" />
    <circle cx="0" cy="-3.5" r="2.2" fill="#ffffff" />
    <circle cx="-3.3" cy="-1.1" r="2.2" fill="#ffffff" />
    <circle cx="-2" cy="2.8" r="2.2" fill="#ffffff" />
    <circle cx="2" cy="2.8" r="2.2" fill="#ffffff" />
    <circle cx="3.3" cy="-1.1" r="2.2" fill="#ffffff" />
    <circle cx="0" cy="0" r="1.5" fill="#f4ce5a" />
  </g>
  
  <!-- Flower 2 -->
  <g transform="translate(48, 45)">
    <circle cx="0" cy="0" r="4" fill="#ffffff" />
    <circle cx="0" cy="-3.5" r="2.2" fill="#ffffff" />
    <circle cx="-3.3" cy="-1.1" r="2.2" fill="#ffffff" />
    <circle cx="-2" cy="2.8" r="2.2" fill="#ffffff" />
    <circle cx="2" cy="2.8" r="2.2" fill="#ffffff" />
    <circle cx="3.3" cy="-1.1" r="2.2" fill="#ffffff" />
    <circle cx="0" cy="0" r="1.5" fill="#f4ce5a" />
  </g>

  <!-- Flower 3 -->
  <g transform="translate(21, 100)">
    <circle cx="0" cy="0" r="4" fill="#ffffff" />
    <circle cx="0" cy="-3.5" r="2.2" fill="#ffffff" />
    <circle cx="-3.3" cy="-1.1" r="2.2" fill="#ffffff" />
    <circle cx="-2" cy="2.8" r="2.2" fill="#ffffff" />
    <circle cx="2" cy="2.8" r="2.2" fill="#ffffff" />
    <circle cx="3.3" cy="-1.1" r="2.2" fill="#ffffff" />
    <circle cx="0" cy="0" r="1.5" fill="#f4ce5a" />
  </g>

  <!-- Flower 4 -->
  <g transform="translate(42, 156)">
    <circle cx="0" cy="0" r="4" fill="#ffffff" />
    <circle cx="0" cy="-3.5" r="2.2" fill="#ffffff" />
    <circle cx="-3.3" cy="-1.1" r="2.2" fill="#ffffff" />
    <circle cx="-2" cy="2.8" r="2.2" fill="#ffffff" />
