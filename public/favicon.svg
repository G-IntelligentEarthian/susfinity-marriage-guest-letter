    <circle cx="0" cy="0" r="4" fill="#ffffff" />
    <circle cx="0" cy="-3.5" r="2.2" fill="#ffffff" />
    <circle cx="-3.3" cy="-1.1" r="2.2" fill="#ffffff" />
    <circle cx="-2" cy="2.8" r="2.2" fill="#ffffff" />
