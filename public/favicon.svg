    <circle cx="0" cy="0" r="1.5" fill="#f4ce5a" />
  </g>

  <!-- 2. THE EARTH GLOBE (Centered behind infinity symbol) -->
  <g transform="translate(100, 100)">
    <!-- Globe Base Sphere -->
    <circle
      cx="0"
      cy="0"
      r="36"
      fill="url(#globeGrad)"
      stroke="#52756a"
      stroke-width="1"
    />

    <!-- Handdrawn Continent Continents Shape -->
    <path
      d="M-28 -8 C-25 -10, -18 -8, -15 -14 C-12 -20, -5 -18, -4 -25 C-3 -32, -15 -32, -22 -28 C-29 -24, -32 -18, -32 -12 C-32 -6, -30 -6, -28 -8 M12 -31 C10 -28, 2 -26, 0 -18 C-2 -10, 8 -7, 10 -3 C12 1, 6 6, 4 12 C2 18, 12 18, 16 22 C18 20, 24 20, 26 14 C28 8, 30 1, 32 -7 C34 -15, 28 -22, 28 -28 C28 -34, 18 -34, 12 -31 M-25 15 C-23 12, -16 10, -14 15 C-12 20, -18 25, -21 28 C-24 31, -28 25, -25 15 Z"
      fill="#85ad9d"
      stroke="#4f6e62"
      stroke-width="0.8"
      fill-opacity="0.75"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Delicate Latitude/Longitude rings for tech-earth harmony -->
    <ellipse cx="0" cy="0" rx="36" ry="10" stroke="#4a6e60" stroke-width="0.6" stroke-opacity="0.25" fill="none" />
    <path d="M-36 0 C-15 15, 15 15, 36 0" stroke="#4a6e60" stroke-width="0.6" stroke-opacity="0.25" fill="none" />
    <path d="M0 -36 C10 -15, 10 15, 0 36" stroke="#4a6e60" stroke-width="0.6" stroke-opacity="0.25" fill="none" />
    <path d="M0 -36 C-10 -15, -10 15, 0 36" stroke="#4a6e60" stroke-width="0.6" stroke-opacity="0.25" fill="none" />
  </g>

  <!-- 3. BOTANICAL VINE INFINITY SYMBOL (Wrapping the globe) -->
  <g>
    <!-- Main Infinity vine loops -->
    <path
      id="infinity-path"
      d="M58 100 C58 76, 88 68, 100 100 C112 132, 142 124, 142 100 C142 76, 112 68, 100 100 C88 132, 58 124, 58 100 Z"
      stroke="url(#vineGrad)"
      stroke-width="4.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />

    <!-- Outer overlay vine to add natural "nested twist" texture -->
    <path
      d="M61 98 C62 78, 86 73, 100 100 C114 127, 138 122, 139 98 C140 78, 114 73, 100 100 C86 127, 62 122, 61 98 Z"
      stroke="#90b08a"
      stroke-width="1"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
      stroke-opacity="0.8"
    />

    <!-- Vine leaves branching off the infinity loop -->
    <path d="M72 82 C65 77, 63 80, 68 83 C73 86, 72 82, 72 82 Z" fill="#769371" />
    <path d="M62 105 C55 112, 58 114, 62 110 C66 106, 62 105, 62 105 Z" fill="#546e50" />
    <path d="M80 118 C78 126, 82 126, 82 120 C82 114, 80 118, 80 118 Z" fill="#799673" />
    <path d="M92 90 C96 82, 92 82, 90 87 C88 92, 92 90, 92 90 Z" fill="#688463" />

    <path d="M128 118 C135 123, 137 120, 132 117 C127 114, 128 118, 128 118 Z" fill="#769371" />
    <path d="M138 95 C145 88, 142 86, 138 90 C134 94, 138 95, 138 95 Z" fill="#546e50" />
    <path d="M120 82 C122 74, 118 74, 118 80 C118 86, 120 82, 120 82 Z" fill="#799673" />
    <path d="M108 110 C104 118, 108 118, 110 113 C112 108, 108 110, 108 110 Z" fill="#688463" />
  </g>

  <!-- 4. SEED & BLOSSOM DETAIL IN THE INFINITY CRADLE -->
  <g transform="translate(100, 100)">
    <circle cx="0" cy="0" r="3" fill="#ffffff" />
    <circle cx="0" cy="-2.5" r="1.6" fill="#ffffff" />
    <circle cx="-2.3" cy="-0.8" r="1.6" fill="#ffffff" />
    <circle cx="-1.4" cy="2" r="1.6" fill="#ffffff" />
    <circle cx="1.4" cy="2" r="1.6" fill="#ffffff" />
    <circle cx="2.3" cy="-0.8" r="1.6" fill="#ffffff" />
    <circle cx="0" cy="0" r="1" fill="#f4ce5a" />
  </g>

  <!-- Flower in left loop peak (70, 80) -->
  <g transform="translate(70, 80)">
    <circle cx="0" cy="0" r="2.5" fill="#ffffff" />
    <circle cx="0" cy="-2" r="1.3" fill="#ffffff" />
    <circle cx="-1.8" cy="-0.6" r="1.3" fill="#ffffff" />
    <circle cx="-1.1" cy="1.6" r="1.3" fill="#ffffff" />
